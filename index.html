<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Netflix Clone - Seleção de perfis para acessar o catálogo de filmes e séries">
    <title>Netflix Clone - Seleção de Perfil</title>
    <link rel="icon" href="https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2016.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="./catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="./assets/perfil-1.png" alt="Ilustração pop art de uma mulher punk com cabelos espetados em tons de rosa e preto, vestindo jaqueta de couro sobre fundo azul vibrante">
                                <figcaption>Gaby</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="./catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="./assets/perfil-2.png" alt="Ilustração pop art de um homem punk com moicano em leque amarelo e rosa, vestindo jaqueta de couro com diversos bótons coloridos, sobre fundo azul.">
                                <figcaption>Jonas</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="./catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="./assets/perfil-3.png" alt="Arte abstrata de colagem pop art em tons de azul e verde sobre fundo laranja.">
                                <figcaption>Família</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="./catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="./assets/perfil-4.png" alt="Arte pop art de brinquedos variados com cores vibrantes e texturas de impressão granulada">
                                <figcaption>Kids</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>

        <section class="manage-section">
            <button type="button" class="manage-button">Gerenciar perfis</button>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
